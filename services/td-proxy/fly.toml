# fly.toml app configuration file generated for e17trains-td-proxy on 2026-04-23T11:11:52+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'e17trains-td-proxy'
primary_region = 'lhr'

[build]

[env]
  ALLOWED_ORIGIN = 'https://e17trains.uk'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
