<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cream paper background with rounded corners (matches PWA theme) -->
  <rect width="512" height="512" rx="96" fill="#f6efdf"/>

  <!-- Orange roundel ring -->
  <circle cx="256" cy="256" r="158" fill="none" stroke="#ee7c0e" stroke-width="44"/>

  <!-- Orange horizontal bar across the middle -->
  <rect x="72" y="222" width="368" height="68" fill="#ee7c0e"/>

  <!-- "WEAVER" text in cream -->
  <text x="256" y="282"
        font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="56"
        font-weight="900"
        fill="#f6efdf"
        text-anchor="middle"
        style="letter-spacing: 3px;">WEAVER</text>
</svg>
