<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Cream background -->
  <rect width="1200" height="630" fill="#f6efdf"/>

  <!-- Roundel group, centred vertically, offset left -->
  <g transform="translate(340, 315)">
    <!-- Orange ring -->
    <circle cx="0" cy="0" r="190" fill="none" stroke="#ee7c0e" stroke-width="52"/>
    <!-- Orange bar -->
    <rect x="-268" y="-40" width="536" height="80" fill="#ee7c0e"/>
    <!-- "E17 TRAINS" text -->
    <text x="0" y="14"
          font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="54"
          font-weight="900"
          fill="#f6efdf"
          text-anchor="middle"
          style="letter-spacing: 2px;">E17 TRAINS</text>
  </g>

  <!-- Right side text -->
  <text x="730" y="270"
        font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72"
        font-weight="900"
        fill="#1a1a1a"
        text-anchor="start">E17 Trains</text>
  <text x="733" y="330"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="28"
        font-weight="400"
        fill="#555"
        text-anchor="start">Live train times from popular</text>
  <text x="733" y="368"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="28"
        font-weight="400"
        fill="#555"
        text-anchor="start">E17 toddler viewpoints</text>

  <!-- Subtle bottom accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#ee7c0e"/>
</svg>
